services:
  postgres:
    image: postgres:16
    container_name: lingdu-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: community
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: lingdu-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: